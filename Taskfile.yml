# Taskfile for the goal toolchain. Run `task` to list available tasks.
# See https://taskfile.dev
version: "3"

vars:
  # Both CLIs: `goal` is the whole-program driver, `goalc` the single-file transpiler.
  CMDS: ./cmd/goal ./cmd/goalc

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install the goal and goalc binaries to GOBIN (or $GOPATH/bin)
    cmds:
      - go install {{.CMDS}}
      - cmd: |
          dest="$(go env GOBIN)"; [ -n "$dest" ] || dest="$(go env GOPATH)/bin"
          echo "installed goal, goalc -> $dest (ensure it is on your PATH)"
        silent: true

  build:
    desc: Build both binaries into ./bin
    cmds:
      - go build -o bin/goal ./cmd/goal
      - go build -o bin/goalc ./cmd/goalc

  test:
    desc: Run the full test suite (cache disabled)
    cmds:
      - go test ./... -count=1

  vet:
    desc: Run go vet across all packages
    cmds:
      - go vet ./...

  check:
    desc: Vet, verify generated Go is current, then test — the pre-commit gate
    cmds:
      - task: vet
      - task: verify-generated
      - task: test

  generate:
    desc: Transpile the goal compiler source to committed, colocated Go (internal/<pkg>/<file>.go)
    cmds:
      # stage-0 Go-built compiler transpiles the goal source.
      - task: build
      - rm -rf _bootstrap/gen
      # Discover only the .goal packages under ./internal (the Go-only infra
      # byexample/corpus/selfhost has no .goal source, so the emit skips it).
      # Emit preserves the module-relative path: _bootstrap/gen/internal/<pkg>/<file>.go.
      - ./bin/goal build --emit=_bootstrap/gen ./internal
      # Copy each emitted .go beside its .goal source, prepending the generated-file
      # marker so gofmt/vet/tools treat it as generated. A fixed header keeps
      # regeneration byte-identical for the US-004 drift gate. (bash 3.2: no mapfile.)
      - cmd: |
          set -e
          hdr='// Code generated by "task generate" from goal source; DO NOT EDIT.'
          find _bootstrap/gen/internal -name '*.go' | while IFS= read -r f; do
            rel="${f#_bootstrap/gen/}"
            mkdir -p "$(dirname "$rel")"
            { printf '%s\n\n' "$hdr"; cat "$f"; } > "$rel"
          done
      - rm -rf _bootstrap/gen

  verify-generated:
    desc: Fail if committed generated Go has drifted from the goal compiler source
    cmds:
      # stage-0 Go-built compiler regenerates the goal source to a scratch tree.
      - task: build
      - rm -rf _bootstrap/verify
      - ./bin/goal build --emit=_bootstrap/verify ./internal
      # Re-create the committed layout: prepend the SAME fixed header `task generate`
      # uses so a current tree diffs empty. Header + emit are deterministic, so any
      # difference means the committed .go is stale. (bash 3.2: no mapfile.)
      - cmd: |
          set -e
          hdr='// Code generated by "task generate" from goal source; DO NOT EDIT.'
          find _bootstrap/verify/internal -name '*.go' | while IFS= read -r f; do
            tmp="$f.hdr"
            { printf '%s\n\n' "$hdr"; cat "$f"; } > "$tmp"
            mv "$tmp" "$f"
          done
      # Two-way compare (ignoring .goal sources) per emitted entry. internal/ now also
      # holds Go-only infra (byexample/corpus/selfhost) the emit does not produce, so
      # scope the diff to exactly the entries the emit generated (the compiler's
      # main.go plus its <pkg> dirs). This catches changed, added, AND removed
      # generated files within the compiler tree; diff exits non-zero on any
      # difference, failing the gate. (bash 3.2: no mapfile.)
      - cmd: |
          set -e
          for entry in _bootstrap/verify/internal/*; do
            name="$(basename "$entry")"
            diff -r -x '*.goal' "internal/$name" "$entry"
          done
      - rm -rf _bootstrap/verify
      - cmd: echo "generated Go is up to date"
        silent: true

  corpus-goalgen:
    desc: Run the corpus behavioral tier through the goal-built compiler (cmd/goal-gen)
    cmds:
      # Build the goal-sourced compiler binary from the committed generated Go
      # (goal/internal/{backend,pipeline,project}); `go build` succeeding
      # is itself the US-005 proof that the goal-written compiler compiles.
      - go build -o bin/goal-gen ./cmd/goal-gen
      # Drive the behavioral conformance tier with that binary as the compiler: each
      # transpile case is lowered by goal-gen, then built and vetted in a temp module.
      - GOAL_GEN_BIN="$(pwd)/bin/goal-gen" go test ./internal/corpus -run TestCompileRunnerGoalGen -count=1

  bootstrap:
    desc: 3-stage self-host bootstrap (stage-0 -> goal-c-1 -> goal-c-2)
    cmds:
      # stage 0: the trusted Go-built compiler.
      - task: build
      - rm -rf _bootstrap
      # stage 1: stage-0 transpiles the goal-written compiler, then Go builds goal-c-1.
      # The emitted internal/* packages import goal/internal/*, so the emit dir is
      # turned into a self-contained `module goal` and built from within it (-C),
      # making goal-c-1 a genuinely self-hosted compiler built purely from goal
      # source. The emit only contains the .goal-sourced compiler packages (the
      # Go-only infra has no .goal), so the compiler `main` is the package at
      # ./internal and `go build ./internal` builds the goal-c-N binary.
      - ./bin/goal build --emit=_bootstrap/s1 ./internal
      - printf 'module goal\n\ngo 1.26\n' > _bootstrap/s1/go.mod
      - go build -C _bootstrap/s1 -o ../../bin/goal-c-1 ./internal
      # stage 2: goal-c-1 transpiles the goal-written compiler, then Go builds goal-c-2.
      - ./bin/goal-c-1 build --emit=_bootstrap/s2 ./internal
      - printf 'module goal\n\ngo 1.26\n' > _bootstrap/s2/go.mod
      - go build -C _bootstrap/s2 -o ../../bin/goal-c-2 ./internal

  fixpoint:
    desc: Prove goal-c-1 and goal-c-2 emit byte-identical Go for the compiler's own source
    deps: [bootstrap]
    cmds:
      - rm -rf _bootstrap/fa _bootstrap/fb
      - ./bin/goal-c-1 build --emit=_bootstrap/fa ./internal
      - ./bin/goal-c-2 build --emit=_bootstrap/fb ./internal
      - diff -r _bootstrap/fa _bootstrap/fb
      - cmd: echo "FIXPOINT OK"
        silent: true

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin _bootstrap
