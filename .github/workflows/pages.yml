name: Deploy playground to GitHub Pages

# Builds the interactive playground and deploys it to GitHub Pages. The site is
# built fresh in CI on every push to main — the compiled goal.wasm, the matching
# wasm_exec.js, and the generated features.json are NOT committed (they stay
# gitignored); they exist only in the runner and are handed to the Pages service
# as an ephemeral artifact. Nothing is pushed back to the repo.

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "cmd/goal-wasm/**"
      - "cmd/build-playground/**"
      - "internal/**"
      - "docs/by-example.md"
      - "docs/overview.md"
      - "site/**"
      - "playground-e2e/**"
      - "scripts/build-site.sh"
      - "Taskfile.yml"
      - "go.mod"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Least-privilege token: read the repo, write to Pages, mint the OIDC token the
# deploy step exchanges with the Pages service.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; a newer push supersedes an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          # No go.sum (stdlib-only module), so there is nothing to cache — and
          # leaving the cache on warns about the missing dependencies file.
          cache: false

      # Node runs the headless playground gate. Pin it so the gate always runs —
      # `task e2e` skips the check when node is absent, which must never happen here.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Task
        # $HOME/go/bin is on the runner PATH; pin to v3 to avoid surprise breaks.
        run: go install github.com/go-task/task/v3/cmd/task@v3

      # `task e2e` builds site/ (compiles goal.wasm, copies wasm_exec.js, and
      # regenerates features.json — itself verifying every example against the host
      # transpiler) and then loads the wasm in Node to assert every feature
      # reproduces its seed. A regression in either stage fails here and blocks the
      # deploy rather than shipping a broken playground.
      - name: Build and gate the playground site
        run: task e2e

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
