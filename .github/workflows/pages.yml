name: Deploy playground to GitHub Pages

# Builds the interactive playground and deploys it to GitHub Pages. The site is
# built fresh in CI on every push to main — the compiled goal.wasm, the matching
# wasm_exec.js, and the generated features.json are NOT committed (they stay
# gitignored); they exist only in the runner and are handed to the Pages service
# as an ephemeral artifact. Nothing is pushed back to the repo.

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "cmd/goal-wasm/**"
      - "cmd/build-playground/**"
      - "internal/**"
      - "docs/by-example.md"
      - "site/**"
      - "playground-e2e/**"
      - "go.mod"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Least-privilege token: read the repo, write to Pages, mint the OIDC token the
# deploy step exchanges with the Pages service.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; a newer push supersedes an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          # No go.sum (stdlib-only module), so there is nothing to cache — and
          # leaving the cache on warns about the missing dependencies file.
          cache: false

      - name: Build the playground site
        run: ./scripts/build-site.sh

      # Gate the deploy: load the freshly-built goal.wasm in Node and assert every
      # feature's live transpiler output matches its seed. A regression here blocks
      # publishing rather than shipping a broken playground.
      - name: Smoke-test the playground (wasm in Node)
        working-directory: playground-e2e
        run: node run.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
