<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>goal Playground — by example</title>
    <meta
      name="description"
      content="A live, in-browser playground for goal — a correctness-oriented dialect of Go. Edit a .goal program and watch it transpile to plain Go, with one example per language feature."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- The whole SPA is built by app.js from features.json + playground-map.json,
         and runs the real transpiler in-browser via goal.wasm (preloaded on boot). -->
    <div id="app" class="app">
      <p class="boot">Loading the goal playground…</p>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
